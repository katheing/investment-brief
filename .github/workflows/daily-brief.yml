name: Daily Investment Brief

on:
  schedule:
    # 卡尔加里 7:30 AM MDT (夏令时 Mar-Nov) = 13:30 UTC
    - cron: '0 14 * * 1-5'   # 8:00 AM MDT
    # 冬令时改成 '0 15 * * 1-5'
    # 冬天把上面那行改成 '30 14 * * 1-5' 即可
  workflow_dispatch:          # 也可以手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Generate index.html
        run: python generate.py
        env:
          TZ: America/Edmonton

      - name: Commit and push
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Daily brief $(TZ=America/Edmonton date +%Y-%m-%d)"
          git push
